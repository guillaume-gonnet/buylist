<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Flow v7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .strikethrough { text-decoration: line-through; opacity: 0.3; filter: grayscale(1); }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .modal-active { display: flex !important; }
        input, select { font-size: 16px !important; } 
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="px-4 pt-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800">GroceryFlow</h1>
            <div id="store-indicator" class="hidden text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold uppercase"></div>
        </div>
        <div class="flex mt-2">
            <button onclick="switchTab('planning')" id="tab-planning" class="flex-1 py-3 text-center text-sm font-semibold text-slate-500 tab-active">Plan</button>
            <button onclick="switchTab('shopping')" id="tab-shopping" class="flex-1 py-3 text-center text-sm font-semibold text-slate-500">Shop</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 text-center text-sm font-semibold text-slate-500">Setup</button>
        </div>
    </header>

    <main id="app-content" class="p-4 pb-32">
        <!-- JS will inject content here -->
    </main>

    <!-- FLOATING ADD BUTTON -->
    <button id="fab" onclick="openEditModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl z-20">
        <i class="fa-solid fa-plus"></i>
    </button>

    <!-- EDIT/ADD MODAL -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-xl font-bold">Item Details</h2>
                <button onclick="closeModal()" class="text-slate-400 text-2xl px-2">&times;</button>
            </div>
            
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Item Name</label>
                    <input id="edit-name" type="text" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Category</label>
                    <select id="edit-category" class="w-full border-2 p-3 rounded-xl bg-slate-50"></select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Store Availability & Aisles</label>
                    <div id="modal-stores-list" class="space-y-2 mt-1"></div>
                </div>
            </div>
            <div class="flex gap-2 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600">Cancel</button>
                <button onclick="saveItem()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Save</button>
            </div>
            <button id="delete-btn" onclick="deleteItem()" class="w-full mt-6 text-red-400 text-xs font-bold uppercase tracking-widest">Delete Permanently</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const DEFAULTS = {
            items: [],
            stores: ["Walmart", "Sams Club"],
            categories: ["Produce", "Meat", "Dairy", "Frozen", "Pantry", "Household", "Other"]
        };

        let appData = loadData();

        function loadData() {
            let saved = localStorage.getItem('grocery_pro_v6'); // Kept key for compatibility
            if (!saved) return JSON.parse(JSON.stringify(DEFAULTS));
            try {
                let parsed = JSON.parse(saved);
                return {
                    items: parsed.items || [],
                    stores: parsed.stores || DEFAULTS.stores,
                    categories: parsed.categories || DEFAULTS.categories
                };
            } catch(e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
        }

        function sync() {
            localStorage.setItem('grocery_pro_v6', JSON.stringify(appData));
            render();
        }

        // --- STATE ---
        let state = {
            currentTab: 'planning',
            shopStore: appData.stores[0] || '',
            planStore: 'All Stores',
            searchQuery: '',
            sortMode: 'category'
        };

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('header button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('store-indicator').classList.toggle('hidden', tab !== 'shopping');
            document.getElementById('fab').classList.toggle('hidden', tab === 'settings');
            render();
        }

        // --- SEARCH HELPERS ---
        function clearSearch() {
            state.searchQuery = '';
            const input = document.getElementById('search-input');
            if (input) {
                input.value = '';
                input.focus();
            }
            toggleClearBtn();
            renderPlanningList();
        }

        function toggleClearBtn() {
            const btn = document.getElementById('clear-search');
            if (btn) {
                btn.classList.toggle('hidden', state.searchQuery.length === 0);
            }
        }

        // --- CORE LOGIC ---
        function handlePlanClick(id) {
            const item = appData.items.find(i => i.id === id);
            if (item.needed && !item.bought) {
                item.needed = false;
                item.bought = false;
            } else {
                item.needed = true;
                item.bought = false;
            }
            sync();
        }

        function markBought(id) {
            const item = appData.items.find(i => i.id === id);
            item.bought = true;
            sync();
        }

        // --- MODAL ---
        function openEditModal(id = null) {
            const modal = document.getElementById('edit-modal');
            document.getElementById('edit-category').innerHTML = appData.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('modal-stores-list').innerHTML = appData.stores.map(s => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border">
                    <input type="checkbox" id="check-${s}" class="w-5 h-5">
                    <span class="flex-1 text-sm font-semibold">${s}</span>
                    <input id="aisle-${s}" type="text" class="w-20 p-1 border rounded text-center text-sm" placeholder="Aisle">
                </div>
            `).join('');

            if (id) {
                const item = appData.items.find(i => i.id == id);
                document.getElementById('edit-id').value = item.id;
                document.getElementById('edit-name').value = item.name;
                document.getElementById('edit-category').value = item.category || "Other";
                appData.stores.forEach(s => {
                    if (item.stores && item.stores[s] !== undefined) {
                        document.getElementById(`check-${s}`).checked = true;
                        document.getElementById(`aisle-${s}`).value = item.stores[s] || '';
                    }
                });
                document.getElementById('delete-btn').classList.remove('hidden');
            } else {
                document.getElementById('edit-id').value = '';
                document.getElementById('edit-name').value = '';
                document.getElementById('delete-btn').classList.add('hidden');
            }
            modal.classList.add('modal-active');
        }

        function closeModal() { document.getElementById('edit-modal').classList.remove('modal-active'); }

        function saveItem() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            if (!name) return;
            const storesObj = {};
            appData.stores.forEach(s => {
                if (document.getElementById(`check-${s}`).checked) {
                    storesObj[s] = document.getElementById(`aisle-${s}`).value;
                }
            });
            if (id) {
                let idx = appData.items.findIndex(i => i.id == id);
                appData.items[idx] = { ...appData.items[idx], name, category: document.getElementById('edit-category').value, stores: storesObj };
            } else {
                appData.items.push({ id: Date.now(), name, category: document.getElementById('edit-category').value, needed: true, bought: false, stores: storesObj });
            }
            closeModal();
            sync();
        }

        function deleteItem() {
            if(!confirm("Delete forever?")) return;
            appData.items = appData.items.filter(i => i.id != document.getElementById('edit-id').value);
            closeModal();
            sync();
        }

        // --- RENDERERS ---
        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';

            if (state.currentTab === 'planning') {
                container.innerHTML = `
                    <div class="sticky top-[100px] bg-slate-100 pb-4 z-20 space-y-2">
                        <div class="relative shadow-sm flex items-center">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-300"></i>
                            <input type="text" id="search-input" value="${state.searchQuery}" 
                                oninput="state.searchQuery=this.value; renderPlanningList(); toggleClearBtn()" 
                                class="w-full p-3.5 pl-12 pr-10 rounded-2xl border-none outline-none" 
                                placeholder="Search my items...">
                            <button id="clear-search" onclick="clearSearch()" 
                                class="${state.searchQuery ? '' : 'hidden'} absolute right-4 text-slate-400 p-1">
                                <i class="fa-solid fa-circle-xmark"></i>
                            </button>
                        </div>
                        <div class="flex gap-2">
                            <select onchange="state.planStore=this.value; renderPlanningList()" class="flex-1 p-2 rounded-xl border-none shadow-sm font-bold text-blue-600 bg-white text-xs">
                                <option>All Stores</option>
                                ${appData.stores.map(s => `<option value="${s}" ${state.planStore===s?'selected':''}>${s}</option>`).join('')}
                            </select>
                            <button onclick="state.sortMode = (state.sortMode === 'category' ? 'alpha' : 'category'); renderPlanningList()" 
                                class="bg-white px-4 py-2 rounded-xl shadow-sm font-bold text-xs text-slate-600">
                                <i class="fa-solid ${state.sortMode === 'category' ? 'fa-layer-group' : 'fa-arrow-down-a-z'} mr-1"></i>
                                ${state.sortMode === 'category' ? 'Categorized' : 'A-Z'}
                            </button>
                        </div>
                    </div>
                    <div id="p-list" class="mt-2"></div>
                `;
                renderPlanningList();
            } else if (state.currentTab === 'shopping') {
                renderShoppingView(container);
            } else {
                renderSettingsView(container);
            }
        }

        function renderPlanningList() {
            const listDiv = document.getElementById('p-list');
            if(!listDiv) return;
            listDiv.innerHTML = '';
            const q = state.searchQuery.toLowerCase();
            
            let filtered = appData.items.filter(i => {
                const matchesSearch = i.name.toLowerCase().includes(q);
                const matchesStore = state.planStore === 'All Stores' || (i.stores && i.stores.hasOwnProperty(state.planStore));
                return matchesSearch && matchesStore;
            });

            if (state.sortMode === 'alpha') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
                const active = filtered.filter(i => i.needed && !i.bought);
                const striked = filtered.filter(i => !i.needed || i.bought);
                if(active.length > 0) {
                    listDiv.innerHTML += `<h3 class="text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">To Buy</h3>`;
                    active.forEach(item => listDiv.innerHTML += renderItemHTML(item));
                }
                if(striked.length > 0) {
                    listDiv.innerHTML += `<h3 class="text-[10px] font-black text-slate-400 uppercase mt-6 mb-2 ml-1">Everything Else</h3>`;
                    striked.forEach(item => listDiv.innerHTML += renderItemHTML(item));
                }
            } else {
                appData.categories.forEach(cat => {
                    const catItems = filtered.filter(i => (i.category || 'Other') === cat);
                    if (catItems.length === 0) return;
                    const section = document.createElement('div');
                    section.className = "mb-6";
                    section.innerHTML = `<h3 class="text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">${cat}</h3>`;
                    catItems.forEach(item => section.innerHTML += renderItemHTML(item));
                    listDiv.appendChild(section);
                });
            }
        }

        function renderItemHTML(item) {
            const isStriked = !item.needed || item.bought;
            return `
                <div class="flex justify-between items-center bg-white p-4 rounded-xl mb-2 shadow-sm border border-slate-100 ${isStriked ? 'strikethrough' : ''}">
                    <div class="flex-1" onclick="handlePlanClick(${item.id})">
                        <p class="font-bold text-slate-700">${item.name}</p>
                        <p class="text-[10px] text-slate-400">${Object.keys(item.stores).join(' • ')}</p>
                    </div>
                    <button onclick="openEditModal(${item.id})" class="p-2 text-blue-400"><i class="fa-solid fa-pen text-sm"></i></button>
                </div>
            `;
        }

        function renderShoppingView(container) {
            container.innerHTML = `
                <select onchange="state.shopStore=this.value; render()" class="w-full mb-6 p-4 rounded-2xl shadow-md border-none font-bold text-blue-600 bg-white">
                    ${appData.stores.map(s => `<option value="${s}" ${state.shopStore===s?'selected':''}>${s}</option>`).join('')}
                </select>
                <div id="s-list"></div>
            `;
            document.getElementById('store-indicator').innerText = state.shopStore;
            let items = appData.items.filter(i => i.needed && !i.bought && i.stores && i.stores.hasOwnProperty(state.shopStore));
            items.sort((a, b) => {
                let aA = a.stores[state.shopStore] || '';
                let bA = b.stores[state.shopStore] || '';
                if (aA === '' && bA !== '') return -1;
                if (aA !== '' && bA === '') return 1;
                return aA.localeCompare(bA, undefined, {numeric: true});
            });
            const sList = document.getElementById('s-list');
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-white p-5 rounded-2xl mb-3 shadow-md border-l-4 border-blue-500 flex justify-between items-center active:bg-slate-50";
                el.innerHTML = `
                    <div class="flex-1" onclick="markBought(${item.id})">
                        <p class="font-bold text-lg text-slate-800">${item.name}</p>
                        <p class="text-blue-500 text-xs font-black mt-1 uppercase"><i class="fa-solid fa-location-dot mr-1"></i>${item.stores[state.shopStore] || 'No Aisle'}</p>
                    </div>
                    <button onclick="openEditModal(${item.id})" class="text-slate-300 p-2"><i class="fa-solid fa-chevron-right"></i></button>
                `;
                sList.appendChild(el);
            });
            if (items.length === 0) sList.innerHTML = `<div class="text-center py-20 text-slate-400 font-medium">No items left for ${state.shopStore}!</div>`;
        }

        function renderSettingsView(container) {
            container.innerHTML = `
                <div class="space-y-6">
                    <section class="bg-white p-4 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">My Stores</h3>
                            <button onclick="addStore()" class="text-blue-600 text-sm font-bold">+ Add</button>
                        </div>
                        <div class="space-y-2">
                            ${appData.stores.map(s => `
                                <div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg">
                                    <span class="font-medium">${s}</span>
                                    <button onclick="removeStore('${s}')" class="text-red-300 p-2"><i class="fa-solid fa-trash text-sm"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                    <section class="grid grid-cols-2 gap-2">
                        <button onclick="exportData()" class="bg-white p-4 rounded-2xl shadow-sm font-bold text-slate-600 border border-slate-200 text-xs">Export Backup</button>
                        <label class="bg-white p-4 rounded-2xl shadow-sm font-bold text-slate-600 text-center border border-slate-200 cursor-pointer text-xs">
                            Import Backup
                            <input type="file" class="hidden" onchange="importData(event)">
                        </label>
                    </section>
                    <button onclick="if(confirm('Reset all?')) {appData=JSON.parse(JSON.stringify(DEFAULTS)); sync();}" class="w-full text-red-400 text-[10px] font-black uppercase py-10 tracking-widest">Reset App</button>
                </div>
            `;
        }

        function addStore() {
            let s = prompt("Store name:");
            if (s && !appData.stores.includes(s)) { appData.stores.push(s); sync(); }
        }
        function removeStore(s) {
            if (confirm(`Remove ${s}?`)) { appData.stores = appData.stores.filter(x => x !== s); sync(); }
        }
        function exportData() {
            let blob = new Blob([JSON.stringify(appData)], {type:'application/json'});
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `grocery_backup.json`; a.click();
        }
        function importData(e) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let incoming = JSON.parse(ev.target.result);
                appData = { items: incoming.items || [], stores: incoming.stores || DEFAULTS.stores, categories: incoming.categories || DEFAULTS.categories };
                sync();
            };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
