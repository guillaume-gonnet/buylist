<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Flow v13</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .strikethrough { opacity: 0.25; filter: grayscale(1); }
        .strikethrough p { text-decoration: line-through; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; background: #f8fafc; }
        .modal-active { display: flex !important; }
        ::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="px-4 pt-2 flex justify-between items-center">
            <h1 class="text-lg font-bold text-slate-800 tracking-tight">GroceryFlow</h1>
            <div id="store-indicator" class="hidden text-[9px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase"></div>
        </div>
        <div class="flex mt-1">
            <button onclick="switchTab('planning')" id="tab-planning" class="flex-1 py-2 text-center text-xs font-semibold text-slate-500 tab-active">Plan</button>
            <button onclick="switchTab('shopping')" id="tab-shopping" class="flex-1 py-2 text-center text-xs font-semibold text-slate-500">Shop</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-2 text-center text-xs font-semibold text-slate-500">Setup</button>
        </div>
    </header>

    <main id="app-content" class="p-2 pb-32">
        <!-- Content injected here -->
    </main>

    <!-- UNDO SNACKBAR -->
    <div id="snackbar" class="hidden fixed bottom-20 left-4 right-4 z-40 animate-slide-up">
        <div class="bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl flex justify-between items-center">
            <span id="snackbar-msg" class="text-sm font-medium">Action completed</span>
            <button onclick="undoLastAction()" class="text-blue-400 font-bold text-sm uppercase tracking-wider ml-4">Undo</button>
        </div>
    </div>

    <!-- FLOATING ADD BUTTON -->
    <button id="fab" onclick="openEditModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl z-20 active:scale-90 transition-transform">
        <i class="fa-solid fa-plus"></i>
    </button>

    <!-- MODAL -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl p-5 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-lg font-bold">Item Details</h2>
                <button onclick="closeModal()" class="text-slate-400 text-2xl px-2">&times;</button>
            </div>
            <input type="hidden" id="edit-id">
            <div class="space-y-3 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Item Name</label>
                    <input id="edit-name" type="text" class="w-full border p-2 rounded-lg outline-none focus:border-blue-500 bg-slate-50">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Category</label>
                    <select id="edit-category" class="w-full border p-2 rounded-lg bg-slate-50"></select>
                </div>
                <div id="modal-stores-list" class="space-y-1.5 mt-1"></div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 py-2.5 bg-slate-100 rounded-lg font-bold text-slate-600 text-sm">Cancel</button>
                <button onclick="saveItem()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm">Save</button>
            </div>
            <button id="delete-btn" onclick="deleteItem()" class="w-full mt-4 text-red-400 text-[10px] font-bold uppercase tracking-widest">Delete Item</button>
        </div>
    </div>

    <script>
        // --- DATA & MIGRATION ---
        const DEFAULTS = {
            items: [],
            stores: ["Walmart", "Sams Club"],
            categories: ["Weekly", "Fruits and vegetables", "Meat", "Dairy", "Frozen", "Pantry", "Household", "Other"]
        };

        let appData = loadData();
        let lastAction = null;
        let snackbarTimeout = null;

        function loadData() {
            let saved = localStorage.getItem('grocery_pro_v6'); 
            let data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
            
            // Migration Logic
            data.categories = DEFAULTS.categories;
            data.items.forEach(item => {
                // Consolidate all Produce variants into "Fruits and vegetables"
                if (["Produce", "Fruits", "Vegetables"].includes(item.category)) {
                    item.category = "Fruits and vegetables";
                }
                if (!DEFAULTS.categories.includes(item.category)) item.category = "Other";
            });
            return data;
        }

        function sync() {
            localStorage.setItem('grocery_pro_v6', JSON.stringify(appData));
            render();
        }

        // --- STATE ---
        let state = {
            currentTab: 'planning',
            shopStore: appData.stores[0] || '',
            planStore: 'All Stores',
            searchQuery: '',
            groupMode: 'category', // 'category' or 'flat'
            sortMode: 'status'     // 'status' or 'alpha'
        };

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('header button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('store-indicator').classList.toggle('hidden', tab !== 'shopping');
            document.getElementById('fab').classList.toggle('hidden', tab === 'settings');
            render();
        }

        // --- SORTING ENGINE ---
        function sortItems(arr) {
            return arr.sort((a, b) => {
                // Status mode puts "Needed & Not Bought" items at the top of the group
                if (state.sortMode === 'status') {
                    const statusA = (a.needed && !a.bought) ? 0 : 1;
                    const statusB = (b.needed && !b.bought) ? 0 : 1;
                    if (statusA !== statusB) return statusA - statusB;
                }
                return a.name.localeCompare(b.name);
            });
        }

        // --- ACTIONS ---
        function handlePlanClick(id) {
            const item = appData.items.find(i => i.id === id);
            const copy = JSON.parse(JSON.stringify(item));
            if (item.needed && !item.bought) { 
                item.needed = false; item.bought = false; 
                showUndoSnackbar(`Removed ${item.name}`, copy); 
            } else { 
                item.needed = true; item.bought = false; 
                showUndoSnackbar(`Added ${item.name}`, copy); 
            }
            sync();
        }

        function markBought(id) {
            const item = appData.items.find(i => i.id === id);
            const copy = JSON.parse(JSON.stringify(item));
            item.bought = true;
            showUndoSnackbar(`Bought ${item.name}`, copy);
            sync();
        }

        function showUndoSnackbar(msg, itemBefore) {
            lastAction = itemBefore;
            const bar = document.getElementById('snackbar');
            document.getElementById('snackbar-msg').innerText = msg;
            bar.classList.remove('hidden');
            clearTimeout(snackbarTimeout);
            snackbarTimeout = setTimeout(() => bar.classList.add('hidden'), 5000);
        }

        function undoLastAction() {
            if (!lastAction) return;
            const idx = appData.items.findIndex(i => i.id === lastAction.id);
            if (idx !== -1) appData.items[idx] = lastAction;
            document.getElementById('snackbar').classList.add('hidden');
            lastAction = null; sync();
        }

        // --- RENDERERS ---
        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            if (state.currentTab === 'planning') renderPlanning(container);
            else if (state.currentTab === 'shopping') renderShopping(container);
            else renderSettings(container);
        }

        function renderPlanning(container) {
            container.innerHTML = `
                <div class="sticky top-[80px] bg-slate-50 pb-2 z-20 space-y-1.5">
                    <div class="relative shadow-sm">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-300 text-sm"></i>
                        <input type="text" id="search-input" value="${state.searchQuery}" oninput="state.searchQuery=this.value; renderPlanningList()" 
                            class="w-full p-2 pl-9 pr-8 rounded-lg border-none shadow-sm outline-none text-sm" placeholder="Search...">
                        <button onclick="state.searchQuery=''; render();" class="${state.searchQuery ? '' : 'hidden'} absolute right-3 top-2.5 text-slate-300"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                    <div class="grid grid-cols-3 gap-1">
                        <select onchange="state.planStore=this.value; renderPlanningList()" class="p-1.5 rounded-lg border-none shadow-sm font-bold text-blue-600 bg-white text-[9px]">
                            <option>All Stores</option>
                            ${appData.stores.map(s => `<option value="${s}" ${state.planStore===s?'selected':''}>${s}</option>`).join('')}
                        </select>
                        <button onclick="state.groupMode = (state.groupMode==='category'?'flat':'category'); render();" class="bg-white p-1.5 rounded-lg shadow-sm font-bold text-[9px] text-slate-500">
                            ${state.groupMode==='category'?'Categorized':'Flat A-Z'}
                        </button>
                        <button onclick="state.sortMode = (state.sortMode==='status'?'alpha':'status'); render();" class="bg-white p-1.5 rounded-lg shadow-sm font-bold text-[9px] text-slate-500">
                            ${state.sortMode==='status'?'By Status':'By Name'}
                        </button>
                    </div>
                </div>
                <div id="p-list" class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200"></div>
            `;
            renderPlanningList();
        }

        function renderPlanningList() {
            const listDiv = document.getElementById('p-list');
            listDiv.innerHTML = '';
            const q = state.searchQuery.toLowerCase();
            let filtered = appData.items.filter(i => i.name.toLowerCase().includes(q) && (state.planStore === 'All Stores' || i.stores.hasOwnProperty(state.planStore)));

            if (state.groupMode === 'flat') {
                // Pin Weekly, then sort everything else
                const weekly = sortItems(filtered.filter(i => i.category === 'Weekly'));
                const others = sortItems(filtered.filter(i => i.category !== 'Weekly'));
                if (weekly.length) {
                    listDiv.innerHTML += `<div class="bg-amber-50 px-3 py-1 border-y border-amber-100 text-[9px] font-black text-amber-600 uppercase tracking-widest">Weekly Pinned</div>`;
                    weekly.forEach(item => listDiv.innerHTML += renderItemHTML(item));
                }
                others.forEach(item => listDiv.innerHTML += renderItemHTML(item));
            } else {
                appData.categories.forEach(cat => {
                    const catItems = sortItems(filtered.filter(i => (i.category || 'Other') === cat));
                    if (catItems.length === 0) return;
                    const bg = cat === 'Weekly' ? 'bg-amber-50 text-amber-600' : 'bg-slate-50 text-slate-400';
                    listDiv.innerHTML += `<div class="${bg} px-3 py-1 border-y border-slate-100 text-[9px] font-black uppercase tracking-widest">${cat}</div>`;
                    catItems.forEach(item => listDiv.innerHTML += renderItemHTML(item));
                });
            }
        }

        function renderItemHTML(item) {
            const isStriked = !item.needed || item.bought;
            return `<div class="flex justify-between items-center px-3 py-2 border-b border-slate-50 last:border-0 ${isStriked ? 'strikethrough' : ''}">
                <div class="flex-1 min-w-0 pr-2" onclick="handlePlanClick(${item.id})">
                    <p class="font-semibold text-sm text-slate-700 truncate">${item.name}</p>
                    <p class="text-[9px] text-slate-400 truncate">${Object.keys(item.stores).join(' • ')}</p>
                </div>
                <button onclick="openEditModal(${item.id})" class="text-slate-300 p-2"><i class="fa-solid fa-pen text-[10px]"></i></button>
            </div>`;
        }

        // --- SHOPPING ---
        function renderShopping(container) {
            container.innerHTML = `<select onchange="state.shopStore=this.value; render()" class="w-full mb-3 p-3 rounded-lg shadow-sm border-none font-bold text-blue-600 bg-white text-sm">
                ${appData.stores.map(s => `<option value="${s}" ${state.shopStore===s?'selected':''}>${s}</option>`).join('')}
            </select><div id="s-list" class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200"></div>`;
            document.getElementById('store-indicator').innerText = state.shopStore;
            let shopItems = appData.items.filter(i => i.needed && !i.bought && i.stores.hasOwnProperty(state.shopStore));
            
            shopItems.sort((a, b) => {
                if (a.category === 'Weekly' && b.category !== 'Weekly') return -1;
                if (a.category !== 'Weekly' && b.category === 'Weekly') return 1;
                return (a.stores[state.shopStore] || '').localeCompare(b.stores[state.shopStore] || '', undefined, {numeric: true});
            });

            const sList = document.getElementById('s-list');
            shopItems.forEach(item => {
                const isWeekly = item.category === 'Weekly';
                sList.innerHTML += `<div class="flex justify-between items-center px-4 py-3 border-b border-slate-50 last:border-0 active:bg-slate-50 ${isWeekly?'bg-amber-50/30':''}">
                    <div class="flex-1" onclick="markBought(${item.id})">
                        <p class="font-bold text-sm text-slate-800">${item.name} ${isWeekly?'⭐':''}</p>
                        <p class="text-blue-500 text-[10px] font-bold uppercase"><i class="fa-solid fa-location-dot mr-1"></i>${item.stores[state.shopStore] || 'Top'}</p>
                    </div>
                    <button onclick="openEditModal(${item.id})" class="text-slate-200 px-2"><i class="fa-solid fa-chevron-right"></i></button>
                </div>`;
            });
            if (!shopItems.length) sList.innerHTML = `<div class="text-center py-12 text-slate-400 text-xs font-medium">Store Complete!</div>`;
        }

        // --- SETTINGS ---
        function renderSettings(container) {
            container.innerHTML = `<div class="space-y-4">
                <section class="bg-white p-3 rounded-xl shadow-sm border border-slate-200"><div class="flex justify-between items-center mb-3 text-sm font-bold">My Stores <button onclick="addStore()" class="text-blue-600 text-xs">+ Add</button></div><div class="space-y-1">
                    ${appData.stores.map(s => `<div class="flex justify-between items-center p-2 bg-slate-50 rounded border border-slate-100 text-xs font-semibold text-slate-600"><span>${s}</span><div class="flex"><button onclick="editStore('${s}')" class="text-slate-400 p-2"><i class="fa-solid fa-pen text-[10px]"></i></button><button onclick="removeStore('${s}')" class="text-red-300 p-2"><i class="fa-solid fa-trash text-[10px]"></i></button></div></div>`).join('')}
                </div></section><div class="grid grid-cols-2 gap-2"><button onclick="exportData()" class="bg-white p-3 rounded-xl shadow-sm font-bold text-slate-500 border border-slate-200 text-[10px]">Export</button><label class="bg-white p-3 rounded-xl shadow-sm font-bold text-slate-500 text-center border border-slate-200 text-[10px]">Import<input type="file" class="hidden" onchange="importData(event)"></label></div><button onclick="if(confirm('Wipe data?')){appData=JSON.parse(JSON.stringify(DEFAULTS));sync();}" class="w-full text-red-300 text-[9px] font-black uppercase py-8 tracking-widest">Reset App</button></div>`;
        }

        // --- STORE & MODAL HELPERS ---
        function openEditModal(id = null) {
            const modal = document.getElementById('edit-modal');
            document.getElementById('edit-category').innerHTML = appData.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('modal-stores-list').innerHTML = appData.stores.map(s => `<div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded border border-slate-200"><input type="checkbox" id="check-${s}" class="w-4 h-4"><span class="flex-1 text-xs font-semibold text-slate-600">${s}</span><input id="aisle-${s}" type="text" class="w-16 p-1 border rounded text-center text-xs" placeholder="Aisle"></div>`).join('');
            if (id) {
                const item = appData.items.find(i => i.id == id);
                document.getElementById('edit-id').value = item.id;
                document.getElementById('edit-name').value = item.name;
                document.getElementById('edit-category').value = item.category || "Other";
                appData.stores.forEach(s => { if (item.stores && item.stores[s] !== undefined) { document.getElementById(`check-${s}`).checked = true; document.getElementById(`aisle-${s}`).value = item.stores[s] || ''; }});
                document.getElementById('delete-btn').classList.remove('hidden');
            } else {
                document.getElementById('edit-id').value = ''; document.getElementById('edit-name').value = ''; document.getElementById('delete-btn').classList.add('hidden');
            }
            modal.classList.add('modal-active');
        }
        function closeModal() { document.getElementById('edit-modal').classList.remove('modal-active'); }
        function saveItem() {
            const id = document.getElementById('edit-id').value; const name = document.getElementById('edit-name').value;
            if (!name) return; const storesObj = {};
            appData.stores.forEach(s => { if (document.getElementById(`check-${s}`).checked) storesObj[s] = document.getElementById(`aisle-${s}`).value; });
            if (id) { let idx = appData.items.findIndex(i => i.id == id); appData.items[idx] = { ...appData.items[idx], name, category: document.getElementById('edit-category').value, stores: storesObj }; }
            else { appData.items.push({ id: Date.now(), name, category: document.getElementById('edit-category').value, needed: true, bought: false, stores: storesObj }); }
            closeModal(); sync();
        }
        function deleteItem() { if(!confirm("Delete?")) return; appData.items = appData.items.filter(i => i.id != document.getElementById('edit-id').value); closeModal(); sync(); }
        function addStore() { let s = prompt("Store name:"); if (s && !appData.stores.includes(s)) { appData.stores.push(s); sync(); }}
        function editStore(oldName) { let n = prompt("Rename:", oldName); if (!n || n === oldName) return; appData.stores[appData.stores.indexOf(oldName)] = n; appData.items.forEach(i => { if (i.stores && i.stores[oldName]) { i.stores[n] = i.stores[oldName]; delete i.stores[oldName]; }}); sync(); }
        function removeStore(s) { if (confirm(`Delete ${s}?`)) { appData.stores = appData.stores.filter(x => x !== s); appData.items.forEach(i => { if (i.stores) delete i.stores[s]; }); sync(); }}
        function exportData() { let blob = new Blob([JSON.stringify(appData)], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `grocery_backup.json`; a.click(); }
        function importData(e) { let r = new FileReader(); r.onload = (ev) => { let i = JSON.parse(ev.target.result); appData = { items: i.items || [], stores: i.stores || DEFAULTS.stores, categories: DEFAULTS.categories }; sync(); }; r.readAsText(e.target.files[0]); }

        render();
    </script>
</body>
</html>
